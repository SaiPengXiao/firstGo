<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- 背景渐变：深墨夜色 -->
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <!-- 笔杆渐变：墨金 -->
    <linearGradient id="shaft" x1="44" y1="12" x2="20" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8d5a3"/>
      <stop offset="60%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#9a7040"/>
    </linearGradient>
    <!-- 笔尖墨色渐变 -->
    <linearGradient id="tip" x1="16" y1="48" x2="22" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#2d2d3a"/>
    </linearGradient>
    <!-- 墨滴晕散 -->
    <radialGradient id="ink" cx="17" cy="47" r="7" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
    </radialGradient>
    <!-- 矩尺高光 -->
    <linearGradient id="ruler" x1="36" y1="10" x2="54" y2="10" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8d5a3" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- 底板：圆角方形 -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- 内边框细线，增加质感 -->
  <rect x="2" y="2" width="60" height="60" rx="12.5" fill="none" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.25"/>

  <!-- 墨滴晕散（笔尖落墨处） -->
  <ellipse cx="17.5" cy="47" rx="6" ry="4.5" fill="url(#ink)" opacity="0.7"/>

  <!-- ── 毛笔主体 ── -->
  <!-- 笔杆（斜置，右上→左下） -->
  <rect x="18.5" y="14" width="5.5" height="28" rx="2.5"
        transform="rotate(-45 32 32)"
        fill="url(#shaft)"/>

  <!-- 笔杆中间细纹（木质感） -->
  <line x1="39" y1="15" x2="27" y2="27" stroke="#9a7040" stroke-width="0.6" stroke-opacity="0.5"/>
  <line x1="41" y1="17" x2="29" y2="29" stroke="#e8d5a3" stroke-width="0.4" stroke-opacity="0.3"/>

  <!-- 笔头束（扎绳部分，金环） -->
  <rect x="19" y="19.5" width="5.5" height="3"
        transform="rotate(-45 32 32)"
        rx="1" fill="#b8862a"/>
  <rect x="19" y="19.5" width="5.5" height="1"
        transform="rotate(-45 32 32)"
        rx="0.5" fill="#e8d5a3" opacity="0.5"/>

  <!-- 笔尖（锥形） -->
  <path d="M 24 40 L 14.5 49.5 L 20 45 Z" fill="url(#tip)"/>
  <path d="M 20 44 L 14.5 49.5 L 19 48 Z" fill="#080810"/>

  <!-- 笔尖白丝高光 -->
  <line x1="22" y1="42" x2="15.5" y2="48.5" stroke="#e8d5a3" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- ── 矩尺（规矩，右上角） ── -->
  <!-- L形矩尺外框 -->
  <path d="M 38 11 L 54 11 L 54 13.5 L 40.5 13.5 L 40.5 30 L 38 30 Z"
        fill="none"
        stroke="url(#ruler)"
        stroke-width="1.5"
        stroke-linejoin="round"/>

  <!-- 矩尺内角直角标 -->
  <path d="M 51 11 L 51 13.5" stroke="#c9a96e" stroke-width="0.8" stroke-opacity="0.5"/>
  <path d="M 40.5 27 L 38 27" stroke="#c9a96e" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- 矩尺刻度短线 -->
  <line x1="44" y1="11" x2="44" y2="12.5" stroke="#c9a96e" stroke-width="0.6" stroke-opacity="0.45"/>
  <line x1="48" y1="11" x2="48" y2="12.5" stroke="#c9a96e" stroke-width="0.6" stroke-opacity="0.45"/>
  <line x1="40.5" y1="18" x2="41.8" y2="18" stroke="#c9a96e" stroke-width="0.6" stroke-opacity="0.45"/>
  <line x1="40.5" y1="22" x2="41.8" y2="22" stroke="#c9a96e" stroke-width="0.6" stroke-opacity="0.45"/>
  <line x1="40.5" y1="26" x2="41.8" y2="26" stroke="#c9a96e" stroke-width="0.6" stroke-opacity="0.45"/>

  <!-- 直角符号（内角小方块） -->
  <rect x="38" y="11" width="2.5" height="2.5" fill="#c9a96e" opacity="0.35" rx="0.3"/>

  <!-- 底部"墨规"字样暗纹（极小，装饰性） -->
  <text x="32" y="59" font-family="serif" font-size="5.5" fill="#c9a96e"
        opacity="0.4" text-anchor="middle" letter-spacing="1.5">墨规</text>
</svg>
