name: Deploy Vite React to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/react/package-lock.json

      # ✅ 强制跳过 lockfile 平台校验：先删 lockfile，再 install
      - name: Prepare & Build
        run: |
          cd front/react
          # 1. 删除 lockfile 和 node_modules（避免 ci 的平台校验）
          rm -f package-lock.json
          rm -rf node_modules
          # 2. 安装（忽略 scripts + 兼容性参数）
          npm install --no-fund --no-audit --legacy-peer-deps --ignore-scripts
          # 3. 构建
          npm run build

      - name: Copy 404
        run: cp front/react/dist/index.html front/react/dist/404.html

      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: front/react/dist

      - name: Deploy
        uses: actions/deploy-pages@v4
