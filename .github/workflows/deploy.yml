name: Deploy Vite React to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/react/package-lock.json

      - name: Install and Build
        run: |
          cd front/react
          npm ci
          npm run build

      - name: Copy 404
        run: cp front/react/dist/index.html front/react/dist/404.html

      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: front/react/dist

      - name: Deploy
        uses: actions/deploy-pages@v4
