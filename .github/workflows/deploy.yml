name: Deploy Vite React from front/react

on:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Navigate to react app
        run: cd front/react && echo "Working in: $(pwd)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # 指定缓存路径为子目录的 lock 文件
          cache-dependency-path: front/react/package-lock.json

      - name: Install dependencies
        run: cd front/react && npm ci

      - name: Build
        run: cd front/react && npm run build

      - name: Copy 404 for SPA routing
        run: cp front/react/dist/index.html front/react/dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: front/react/dist   # ✅ 关键：上传子目录的 dist

      - name: Deploy
        uses: actions/deploy-pages@v4
